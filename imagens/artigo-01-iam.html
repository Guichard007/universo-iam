<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
width: 1200px; height: 630px;
background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0b2038 100%);
display: flex; flex-direction: column; justify-content: center; align-items: center;
text-align: center; padding: 60px; position: relative; overflow: hidden;
font-family: 'Segoe UI', system-ui, sans-serif;
}
body::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
background: radial-gradient(circle at 30% 70%, rgba(34,211,238,0.08) 0%, transparent 50%); }
body::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
background: linear-gradient(90deg, #22d3ee, #00BFFF, #22d3ee); }
.icon { font-size: 72px; margin-bottom: 30px; position: relative; z-index: 1; }
.title { font-size: 48px; font-weight: 800; color: #e6edf3; line-height: 1.2; margin-bottom: 20px;
position: relative; z-index: 1; max-width: 900px; letter-spacing: -0.02em; }
.subtitle { font-size: 22px; color: #8b949e; position: relative; z-index: 1; margin-bottom: 30px; }
.label { display: inline-block; font-size: 14px; color: #22d3ee; background: rgba(34,211,238,0.12);
padding: 8px 20px; border-radius: 8px; border: 1px solid rgba(34,211,238,0.3);
position: relative; z-index: 1; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
.brand { position: absolute; bottom: 30px; right: 40px; font-size: 16px; font-weight: 700;
color: #30363d; letter-spacing: 0.05em; z-index: 1; }
.corner { position: absolute; width: 120px; height: 120px; border: 2px solid rgba(34,211,238,0.2); border-radius: 50%; }
.corner-tl { top: -30px; left: -30px; }
.corner-br { bottom: -30px; right: -30px; }
</style>
</head>
<body>
<div class="corner corner-tl"></div>
<div class="corner corner-br"></div>
<div class="icon">&#128272;</div>
<div class="title">O que e IAM?</div>
<div class="subtitle">Guia Completo sobre Identity and Access Management</div>
<div class="label">IAM</div>
<div class="brand">UNIVERSO IAM</div>
</body>
</html>
